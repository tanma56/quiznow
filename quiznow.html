<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>今何問目クイズDX 完全版</title>

<style>
body{
    margin:0;
    background:black;
    color:#0ff;
    font-family:sans-serif;
    text-align:center;

    /* ←ここ重要：縦中央 */
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

/* スタート画面 */
#startScreen{
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* ゲーム全体 */
#game{
    width:100%;
    max-width:420px;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    gap:10px;
}

/* テキスト系 */
#question{
    font-size:22px;
    color:#fff;
}

#answerDisplay{
    font-size:32px;
    color:yellow;
    min-height:40px;
}

/* キーパッド基本 */
.keypad{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:6px;
    width:100%;
}

/* ボタン */
button{
    padding:15px;
    font-size:18px;
    background:#111;
    color:#0ff;
    border:1px solid #0ff;
    touch-action:manipulation;
}
button:active{
    background:#0ff;
    color:black;
}

/* =========================
   スマホ（〜768px）
========================= */
@media (max-width:768px){

    body{
        align-items:flex-start;
    }

    #game{
        margin-top:20px;
        padding-bottom:220px;
    }

    .keypad{
        position:fixed;
        bottom:0;
        left:0;
        right:0;
        max-width:420px;
        margin:auto;
        background:#000;
        padding:10px;
        border-top:2px solid #0ff;
    }
}

/* =========================
   タブレット（769px〜1024px）
========================= */
@media (min-width:769px) and (max-width:1024px){

    body{
        align-items:center;
    }

    #game{
        max-width:500px;
    }

    .keypad{
        position:static;
        margin-top:20px;
    }

    button{
        padding:18px;
        font-size:20px;
    }
}

/* =========================
   PC（1025px以上）
========================= */
@media (min-width:1025px){

    body{
        align-items:center;
    }

    #game{
        max-width:600px;
    }

    .keypad{
        position:static;
        margin-top:20px;
        grid-template-columns:repeat(3,120px);
        justify-content:center;
    }

    button{
        padding:20px;
        font-size:20px;
    }
}
    
</style>
</head>

<body>

<div id="startScreen">
<h1>今何問目クイズDX</h1>
<button onclick="startGame()">スタート</button>
</div>

<div id="game" style="display:none;">
<div id="timer"></div>
<div id="info"></div>
<div id="question"></div>
<div id="answerDisplay"></div>

<div class="keypad">
<button onclick="press(1)">1</button>
<button onclick="press(2)">2</button>
<button onclick="press(3)">3</button>
<button onclick="press(4)">4</button>
<button onclick="press(5)">5</button>
<button onclick="press(6)">6</button>
<button onclick="press(7)">7</button>
<button onclick="press(8)">8</button>
<button onclick="press(9)">9</button>
<button onclick="clearInput()">C</button>
<button onclick="press(0)">0</button>
<button onclick="submitAnswer()">決定</button>
</div>

<div id="result"></div>
</div>

<script>
// ===== 基本変数 =====
let q=1, score=0, combo=0;
let correct=0, input="";
let time=60;
let history=[];
let usedAnswers=new Set();
let lastCorrect=null;
let lastType=null;
let answering=true;
let qStart,qTimer,mainTimer;

// ===== スタート =====
function startGame(){
    document.getElementById("startScreen").style.display="none";
    document.getElementById("game").style.display="block";
    startTimer();
    makeQ();
}

// ===== タイマー =====
function startTimer(){
    mainTimer=setInterval(()=>{
        time--;
        document.getElementById("timer").textContent="残り "+time+" 秒";
        if(time<=0) end();
    },1000);
}

// ===== 入力 =====
function press(n){
    if(!answering)return;
    input+=n;
    showInput();
}
function clearInput(){input="";showInput();}
function showInput(){
    document.getElementById("answerDisplay").textContent=input;
}

// ===== ランダム =====
function rand(a,b){return Math.floor(Math.random()*(b-a+1))+a;}

// ===== 問題生成 =====
function makeQ(){
    answering=true;
    input="";
    showInput();
    document.getElementById("result").textContent="";
    qStart=Date.now();

    let types=[];

    if(q===1){
        types=[0,2];
    }else{
        types=[0,1,2];
        if(history.length>0) types.push(3);
        if(q>=6) types.push(4,5);
    }

    let tries=0;

    while(true){
        tries++;
        let type=types[rand(0,types.length-1)];
        if(type===lastType) continue;

        let tempCorrect;

        if(type===0){
            tempCorrect=q;
            show("今何問目？");
        }

        if(type===1){
            let n=rand(1,Math.min(20,q-1));
            tempCorrect=q-n;
            show(`${n}問前は何問目？`);
        }

        if(type===2){
            let n=rand(1,20);
            tempCorrect=q+n;
            show(`${n}問先は何問目？`);
        }

        if(type===3){
            let valid=history.filter(h=>h.answer>0 && !usedAnswers.has(h.answer));
            if(valid.length===0) continue;
            let p=valid[rand(0,valid.length-1)];
            tempCorrect=p.question;
            show(`「${p.answer}問目」と答えたのは何問目？`);
        }

        if(type===4){
            let a=rand(1,Math.min(20,q-1));
            let b=rand(1,20);
            tempCorrect=q-a+b;
            if(tempCorrect<1) continue;
            show(`${a}問前の${b}問後は何問目？`);
        }

        if(type===5){
            let a=rand(1,20);
            let b=rand(1,Math.min(20,q+a-1));
            tempCorrect=q+a-b;
            if(tempCorrect<1) continue;
            show(`${a}問後の${b}問前は何問目？`);
        }

        if(tempCorrect>=1 && tempCorrect!==lastCorrect){
            correct=tempCorrect;
            lastType=type;
            break;
        }

        if(tries>40){
            correct=q;
            show("今何問目？");
            break;
        }
    }

    qTimer=setTimeout(()=>{
        if(answering){
            answering=false;
            combo=0;
            showResult(`時間切れ！（${correct}）`);
            saveHistory(correct);
            next();
        }
    },5000);

    updateInfo();
}

function show(t){
    document.getElementById("question").textContent=`第${q}問：${t}`;
}

// ===== 回答 =====
function submitAnswer(){
    if(!answering)return;
    answering=false;
    clearTimeout(qTimer);

    let user=Number(input);

    if(user===correct){
        combo++;
        let speed=(5000-(Date.now()-qStart))/5000;
        let add=Math.floor(100*(1+speed)*(1+combo*0.2));
        score+=add;
        showResult(`正解！ +${add}`);
    }else{
        combo=0;
        showResult(`不正解（${correct}）`);
    }

    lastCorrect=correct;
    if(user>0) usedAnswers.add(user);
    saveHistory(user>0?user:correct);

    next();
}

function showResult(t){
    document.getElementById("result").textContent=t;
}

function saveHistory(ans){
    history.push({question:q,answer:ans});
}

function next(){
    setTimeout(()=>{
        q++;
        if(time>0) makeQ();
    },1000);
}

function updateInfo(){
    document.getElementById("info").textContent=
        `スコア:${score} コンボ:${combo}`;
}

function rank(){
    if(score>2000)return"S";
    if(score>1200)return"A";
    if(score>600)return"B";
    return"C";
}

function end(){
    clearInterval(mainTimer);
    clearTimeout(qTimer);
    alert(`終了！\nスコア:${score}\nランク:${rank()}`);
    location.reload();
}

// ダブルタップ防止
let lastTouchEnd=0;
document.addEventListener('touchend',e=>{
    let now=Date.now();
    if(now-lastTouchEnd<=300)e.preventDefault();
    lastTouchEnd=now;
},false);
</script>

</body>
</html>
